services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: learning_hub
      POSTGRES_USER: learning_hub
      POSTGRES_PASSWORD: learning_hub_local
    ports: ["5432:5432"]
    volumes: [learning-hub-postgres:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning_hub -d learning_hub"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  learning-hub-postgres:
